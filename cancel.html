<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Cancelled – Supreme Auto Spa ATL</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --black: #0a0a0a; --white: #f5f5f0; --gold: #c9a84c; --gold-light: #e8c96a; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--black);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }
    .card {
      max-width: 420px;
      width: 100%;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.08);
      padding: 56px 40px;
      background: #111118;
    }
    .icon {
      width: 64px; height: 64px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 32px;
      font-size: 28px;
      color: rgba(245,245,240,0.4);
    }
    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 38px;
      letter-spacing: 3px;
      margin-bottom: 16px;
    }
    p {
      font-size: 14px;
      color: rgba(245,245,240,0.5);
      line-height: 1.7;
      margin-bottom: 36px;
    }
    .btn {
      display: inline-block;
      background: var(--gold);
      color: var(--black);
      padding: 14px 36px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn:hover { background: var(--gold-light); }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✕</div>
    <h1>Payment Cancelled</h1>
    <p>No charge was made to your card. If you changed your mind or ran into an issue, you can try again anytime.</p>
    <a href="/" class="btn">← Return Home</a>
  </div>
</body>
</html>
