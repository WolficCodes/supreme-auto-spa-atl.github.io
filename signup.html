<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account – Supreme Auto Spa ATL</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="shared.css" />
  <style>
    .page-wrap {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 100vh;
    }
    /* Left – image panel */
    .img-panel {
      position: relative;
      background: url('https://images.unsplash.com/photo-1607860108855-64acf2078ed9?w=900&auto=format&fit=crop')
        center/cover no-repeat;
    }
    .img-panel::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg,
        rgba(10,10,10,0.75) 0%,
        rgba(10,10,10,0.4) 100%);
    }
    .img-overlay {
      position: absolute; inset: 0; z-index: 1;
      display: flex; flex-direction: column;
      justify-content: flex-end; padding: 56px;
    }
    .img-overlay .tag {
      font-size: 10px; letter-spacing: 4px; text-transform: uppercase;
      color: var(--gold); margin-bottom: 14px;
    }
    .img-overlay h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 48px; letter-spacing: 3px; line-height: 1.05;
      margin-bottom: 16px;
    }
    .img-overlay p {
      font-size: 14px; color: var(--muted); line-height: 1.7;
      max-width: 320px;
    }
    /* Right – form panel */
    .form-panel {
      display: flex; flex-direction: column;
      justify-content: center;
      padding: 100px 64px 60px;
      background: var(--dark);
      overflow-y: auto;
    }
    .form-header { margin-bottom: 36px; }
    .form-header .label {
      font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
      color: var(--gold); margin-bottom: 10px;
    }
    .form-header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 38px; letter-spacing: 2px;
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .signin-link {
      margin-top: 24px; text-align: center;
      font-size: 13px; color: var(--muted);
    }
    .signin-link a { color: var(--gold); text-decoration: none; }
    .signin-link a:hover { text-decoration: underline; }
    @media (max-width: 768px) {
      .page-wrap { grid-template-columns: 1fr; }
      .img-panel { display: none; }
      .form-panel { padding: 100px 28px 48px; }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <a href="index.html" class="nav-logo">Supreme Auto Spa</a>
    <div class="nav-links">
      <a href="signin.html">Sign In</a>
      <a href="signin.html" class="nav-btn">Login</a>
    </div>
  </nav>

  <div class="page-wrap">
    <!-- Left image panel -->
    <div class="img-panel">
      <div class="img-overlay">
        <p class="tag">Premium Mobile Detailing</p>
        <h2>Your Car<br>Deserves<br><span style="color:var(--gold)">The Best</span></h2>
        <p>Create an account to book appointments, track your service history, and manage your vehicles — all in one place.</p>
      </div>
    </div>

    <!-- Right form panel -->
    <div class="form-panel">
      <div class="form-header">
        <p class="label">New Customer</p>
        <h1>Create Account</h1>
      </div>

      <div class="alert alert-error" id="error-msg"></div>
      <div class="alert alert-success" id="success-msg"></div>

      <form id="signup-form" onsubmit="handleSignup(event)">
        <div class="form-row">
          <div class="form-group">
            <label>First Name</label>
            <input type="text" id="fname" placeholder="Marcus" required />
          </div>
          <div class="form-group">
            <label>Last Name</label>
            <input type="text" id="lname" placeholder="Williams" required />
          </div>
        </div>

        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" placeholder="marcus@email.com" required />
        </div>

        <div class="form-group">
          <label>Phone Number</label>
          <input type="tel" id="phone" placeholder="(404) 555-0100" required />
        </div>

        <div class="form-group">
          <label>Vehicle (Year, Make, Model)</label>
          <input type="text" id="vehicle" placeholder="2021 BMW M3" />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Min. 8 characters" required minlength="8" />
          </div>
          <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" id="confirm" placeholder="Repeat password" required />
          </div>
        </div>

        <button type="submit" class="btn btn-gold" id="submit-btn">
          Create Account
        </button>
      </form>

      <p class="signin-link">Already have an account? <a href="signin.html">Sign in</a></p>
    </div>
  </div>

  <script>
    // Demo-mode: stores accounts in localStorage
    function handleSignup(e) {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      const errEl = document.getElementById('error-msg');
      const okEl  = document.getElementById('success-msg');
      errEl.classList.remove('show');
      okEl.classList.remove('show');

      const fname    = document.getElementById('fname').value.trim();
      const lname    = document.getElementById('lname').value.trim();
      const email    = document.getElementById('email').value.trim().toLowerCase();
      const phone    = document.getElementById('phone').value.trim();
      const vehicle  = document.getElementById('vehicle').value.trim();
      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirm').value;

      if (password !== confirm) {
        errEl.textContent = 'Passwords do not match.';
        errEl.classList.add('show');
        return;
      }

      // Check if email already registered
      const accounts = JSON.parse(localStorage.getItem('sas_customers') || '[]');
      if (accounts.find(a => a.email === email)) {
        errEl.textContent = 'An account with that email already exists.';
        errEl.classList.add('show');
        return;
      }

      // Save account
      accounts.push({ fname, lname, email, phone, vehicle, password, bookings: [] });
      localStorage.setItem('sas_customers', JSON.stringify(accounts));

      // Auto sign-in
      localStorage.setItem('sas_session', JSON.stringify({ type: 'customer', email, fname, lname }));

      btn.disabled = true;
      okEl.textContent = 'Account created! Redirecting...';
      okEl.classList.add('show');
      setTimeout(() => { window.location = 'customer-dashboard.html'; }, 1200);
    }
  </script>
</body>
</html>
